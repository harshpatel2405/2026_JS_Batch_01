<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>

    <!-- * External JS -->
    <script>
        var a = 45; // * function scope -- old version -- can be updated 
        console.log("var A : " + a)

        a = 15;
        console.log("var Updated A : " + a)

        let b = 78; // block scope -- new version -- can be updated
        console.log("let B : " + b)

        b = 87
        console.log("let updated B : " + b)

        const c = 56
        console.log("const C : " + c)

        c = 145
        console.log("const updated C : " + c)
    </script>
</body>

</html>
